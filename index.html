<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Dance, Foot Skip - 概念遊戲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB; /* 天空藍 */
            font-family: 'Noto Sans TC', sans-serif;
            touch-action: none; /* 停用雙擊放大等手勢 */
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI 覆蓋層 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 讓點擊穿透到 canvas 或特定按鈕 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 頂部資訊列 */
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: white;
        }

        .score-box {
            font-size: 28px;
            font-weight: 900;
            background: rgba(255, 165, 0, 0.9);
            padding: 10px 20px;
            border-radius: 15px;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* 能量條容器 */
        .energy-container {
            width: 50px;
            height: 200px;
            background: rgba(0,0,0,0.5);
            border: 3px solid white;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            margin-right: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .energy-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #ff4500, #ffd700);
            transition: height 0.1s ease-out;
        }
        
        .energy-icon {
            position: absolute;
            top: -15px;
            font-size: 30px;
            z-index: 10;
        }

        /* 螢幕上的控制提示 */
        #controls-hint {
            text-align: center;
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            align-self: center;
            pointer-events: auto;
        }

        .key {
            display: inline-block;
            background: #eee;
            color: #333;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
            margin: 0 4px;
            border-bottom: 3px solid #ccc;
        }

        /* 開始/結束畫面 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            z-index: 100;
        }

        .screen h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #FFD700;
            text-shadow: 0 0 10px #FF8C00;
        }

        .screen p {
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
            max-width: 600px;
        }

        .btn {
            background: linear-gradient(to bottom, #4CAF50, #2E8B57);
            color: white;
            border: 3px solid white;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        /* Fever 提示文字 */
        #fever-text {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: 900;
            color: #39FF14;
            text-shadow: 0 0 20px white, 0 0 30px #39FF14;
            animation: pulse 0.5s infinite alternate;
            opacity: 0;
            transition: opacity 0.3s;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 任務提示框 */
        #mission-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #FFD700;
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #FFD700;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            display: none;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .mission-complete-anim {
            animation: missionFlash 0.8s ease-in-out;
        }

        @keyframes missionFlash {
            0%, 100% { background: rgba(0, 0, 0, 0.7); color: #FFD700; border-color: #FFD700; }
            50% { background: rgba(255, 215, 0, 0.9); color: #000; border-color: #FFF; transform: translateX(-50%) scale(1.1); }
        }

        /* 搞笑浮動文字 */
        .floating-text {
            position: absolute;
            color: white;
            font-weight: 900;
            font-size: 28px;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            z-index: 150;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, 0) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -30px) scale(1.2) rotate(5deg); }
            100% { opacity: 0; transform: translate(-50%, -60px) scale(1) rotate(-5deg); }
        }

    </style>
</head>
<body>

    <!-- 遊戲畫布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI 覆蓋層 -->
    <div id="ui-layer">
        <div id="hud">
            <div class="score-box">分數 <span id="score">0</span></div>
            <div class="energy-container">
                <div class="energy-icon">⚡</div>
                <div class="energy-bar" id="energy-bar"></div>
            </div>
        </div>

        <div id="mission-box">
            <div style="font-size: 14px; color: #fff; margin-bottom: 5px;">📍 隨機任務</div>
            <div id="mission-text">---</div>
        </div>

        <div id="fever-text">FEVER TIME!<br><span style="font-size: 30px; color: white;">雙臂平舉衝刺中！</span></div>

        <div id="controls-hint">
            <span class="key">←</span> <span class="key">→</span> 切換跑道 | 
            <span class="key">↑</span> 連按踏步(集氣) | 
            <span class="key">Q</span> 左手 <span class="key">E</span> 右手 |
            <span class="key">空白鍵</span> Fever衝刺(滿氣)
        </div>
    </div>

    <!-- 開始畫面 -->
    <div id="start-screen" class="screen">
        <h1>Hand Dance, Foot Skip</h1>
        <p>
            結合「超慢跑」與「肩頸伸展」的健康遊戲原型！<br>
            按 <b>左右方向鍵</b> 切換跑道閃避路障<br>
            不斷連按 <b>上方向鍵</b> 模擬踏步來累積能量<br>
            遇到懸空金幣時，按下 <b>Q (左手)</b> 或 <b>E (右手)</b> 平舉手臂獲取<br>
            能量滿時，按下 <b>空白鍵 (雙手平舉)</b> 進入無敵衝刺！
        </p>
        <button class="btn" id="start-btn">開始運動</button>
    </div>

    <!-- 結束畫面 -->
    <div id="game-over-screen" class="screen hidden">
        <h1 style="color: #FF6347;">運動結束！</h1>
        <p style="font-size: 30px;">最終分數: <span id="final-score" style="color:#FFD700; font-weight:bold;">0</span></p>
        <button class="btn" id="restart-btn">再來一局</button>
    </div>

    <script>
        // 取得 Canvas 和 Context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI 元素
        const scoreEl = document.getElementById('score');
        const energyBarEl = document.getElementById('energy-bar');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const feverTextEl = document.getElementById('fever-text');
        const missionBoxEl = document.getElementById('mission-box');
        const missionTextEl = document.getElementById('mission-text');

        // 調整畫布大小符合視窗
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 遊戲核心變數
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let animationId;
        
        let score = 0;
        let energy = 0;
        let speed = 6;
        let baseSpeed = 6;
        let isFever = false;
        let feverTimer = 0;

        // 任務系統變數
        let currentMission = null;
        let missionCooldown = 120; // 開局後多久出現第一個任務 (幀數)

        // 跑道設定
        const lanes = 3;
        let laneWidth = 0;
        let roadWidth = 0;
        let roadLeftEdge = 0;

        // 搞笑浮動文字產生器
        function showFloatingText(text, x, y, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            if(color) el.style.color = color;
            document.getElementById('ui-layer').appendChild(el);
            setTimeout(() => el.remove(), 1000); // 1秒後移除
        }

        // 玩家狀態
        const player = {
            lane: 1, // 0: 左, 1: 中, 2: 右
            width: 60,
            height: 100,
            color: '#1E90FF', // 機器人藍
            leftArm: false,
            rightArm: false,
            stepYOffset: 0, // 踏步動畫偏移
            stepTick: 0
        };

        // 遊戲物件 (障礙物、金幣)
        let gameObjects = [];
        let frameCount = 0;

        // 按鍵狀態記錄
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            KeyQ: false,
            KeyE: false,
            Space: false
        };

        // 監聽鍵盤事件
        window.addEventListener('keydown', (e) => {
            if(gameState !== 'PLAYING') return;
            if(!keys[e.code]) {
                keys[e.code] = true;
                
                // 單次觸發邏輯
                if(e.code === 'ArrowLeft' && player.lane > 0) player.lane--;
                if(e.code === 'ArrowRight' && player.lane < 2) player.lane++;
                if(e.code === 'ArrowUp' && !isFever) {
                    // 模擬踏步：增加能量、分數微調
                    energy += 3;
                    if(energy > 100) energy = 100;
                    score += 1;
                    // 踏步視覺效果
                    player.stepTick = 10;

                    // 隨機搞笑嘲諷
                    if (Math.random() < 0.05) {
                        const px = roadLeftEdge + player.lane * laneWidth + laneWidth / 2;
                        const py = canvas.height - 200;
                        const jokes = ["阿嬤都比你快！", "太慢啦！", "腳麻了嗎？", "動起來啊！"];
                        showFloatingText(jokes[Math.floor(Math.random()*jokes.length)], px, py, "#FFF");
                    }

                    // 更新任務進度
                    progressMission('step');
                }
                if(e.code === 'KeyQ') player.leftArm = true;
                if(e.code === 'KeyE') player.rightArm = true;
                if(e.code === 'Space' && energy >= 100 && !isFever) {
                    activateFever();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if(e.code === 'KeyQ') player.leftArm = false;
            if(e.code === 'KeyE') player.rightArm = false;
        });

        // 啟動 Fever Time (衝刺模式)
        function activateFever() {
            isFever = true;
            energy = 100; // 消耗能量或從100開始扣
            player.leftArm = true;
            player.rightArm = true;
            feverTextEl.style.opacity = 1;
            document.body.style.backgroundColor = '#FF4500'; // 變成熱血紅
        }

        // --- 任務系統邏輯 ---
        function generateMission() {
            const missions = [
                { type: 'coin', target: 5, desc: '收集 5 枚金幣', reward: 100 },
                { type: 'left_arm', target: 2, desc: '左手平舉拿取 2 次', reward: 150 },
                { type: 'right_arm', target: 2, desc: '右手平舉拿取 2 次', reward: 150 },
                { type: 'step', target: 50, desc: '原地踏步 50 次', reward: 50 }
            ];
            const rand = Math.floor(Math.random() * missions.length);
            currentMission = { ...missions[rand], current: 0 };
            
            missionBoxEl.style.display = 'block';
            missionBoxEl.classList.remove('mission-complete-anim');
            updateMissionUI();
        }

        function updateMissionUI() {
            if (!currentMission) return;
            missionTextEl.innerText = `${currentMission.desc} (${currentMission.current}/${currentMission.target})`;
        }

        function progressMission(type) {
            if (!currentMission || currentMission.type !== type) return;
            
            currentMission.current++;
            updateMissionUI();

            if (currentMission.current >= currentMission.target) {
                // 任務完成
                score += currentMission.reward;
                missionTextEl.innerText = `任務完成！ +${currentMission.reward}分`;
                missionBoxEl.classList.add('mission-complete-anim');
                updateHUD(); // 立即更新分數顯示
                
                currentMission = null;
                missionCooldown = 300; // 延遲約 5 秒後發布新任務
                
                // 延遲隱藏 UI
                setTimeout(() => {
                    if (!currentMission && gameState === 'PLAYING') {
                        missionBoxEl.style.display = 'none';
                    }
                }, 1500);
            }
        }
        // --------------------

        // 初始化遊戲
        function initGame() {
            score = 0;
            energy = 0;
            speed = baseSpeed;
            isFever = false;
            player.lane = 1;
            player.leftArm = false;
            player.rightArm = false;
            gameObjects = [];
            frameCount = 0;
            
            currentMission = null;
            missionCooldown = 120;
            missionBoxEl.style.display = 'none';
            missionBoxEl.classList.remove('mission-complete-anim');

            gameState = 'PLAYING';
            feverTextEl.style.opacity = 0;
            document.body.style.backgroundColor = '#87CEEB';
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            updateHUD();
            gameLoop();
        }

        // 生成遊戲物件
        function spawnObject() {
            // 每隔一段時間生成
            if (frameCount % (isFever ? 30 : 60) === 0) {
                const lane = Math.floor(Math.random() * lanes);
                const rand = Math.random();
                
                let type, width, height, color, text = null;

                if (rand < 0.15) {
                    // 15% 機率搞笑：移動的狗狗 (保留失控的狗狗)
                    type = 'moving_doge'; text = '🐕'; width = 60; height = 60; color = '';
                } else if (rand < 0.50) {
                    // 35% 機率是障礙物 (恢復原本的橘色路障)
                    type = 'obstacle'; width = 80; height = 30; color = '#FFA500';
                } else if (rand < 0.75) {
                    // 25% 機率是健康食物 (恢復原本的金幣)
                    type = 'coin'; width = 40; height = 40; color = '#FFD700';
                } else if (rand < 0.87) {
                    // 12% 機率是左手道具 (恢復原本的綠色圓形)
                    type = 'item_left'; width = 40; height = 40; color = '#00FA9A';
                } else {
                    // 13% 機率是右手道具 (恢復原本的綠色圓形)
                    type = 'item_right'; width = 40; height = 40; color = '#00FA9A';
                }

                gameObjects.push({
                    x: 0, // 將在 draw 時計算
                    y: -50,
                    lane: lane,
                    type: type,
                    width: width,
                    height: height,
                    color: color,
                    text: text,
                    active: true,
                    // 狗專屬：亂跑的移動相位
                    randomOffset: Math.random() * Math.PI * 2
                });
            }
        }

        // 更新與繪製 HUD
        function updateHUD() {
            scoreEl.innerText = Math.floor(score);
            energyBarEl.style.height = `${energy}%`;
            
            if (energy >= 100 && !isFever) {
                energyBarEl.style.background = 'linear-gradient(to top, #39FF14, #00FF00)';
                energyBarEl.style.boxShadow = '0 0 15px #39FF14';
            } else if (!isFever) {
                energyBarEl.style.background = 'linear-gradient(to top, #ff4500, #ffd700)';
                energyBarEl.style.boxShadow = 'none';
            }
        }

        // 繪製背景 (草地與道路)
        function drawBackground() {
            // 草地
            ctx.fillStyle = isFever ? '#8B0000' : '#32CD32';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 道路
            roadWidth = Math.min(canvas.width * 0.8, 600);
            laneWidth = roadWidth / lanes;
            roadLeftEdge = (canvas.width - roadWidth) / 2;

            ctx.fillStyle = '#555';
            ctx.fillRect(roadLeftEdge, 0, roadWidth, canvas.height);

            // 車道線 (動畫效果)
            ctx.fillStyle = 'white';
            ctx.lineWidth = 5;
            const lineOffset = (frameCount * speed) % 80;
            
            for (let i = 1; i < lanes; i++) {
                const lineX = roadLeftEdge + i * laneWidth;
                for (let y = -80 + lineOffset; y < canvas.height; y += 80) {
                    ctx.fillRect(lineX - 5, y, 10, 40);
                }
            }
        }

        // 繪製玩家 (火柴人/機器人)
        function drawPlayer() {
            const px = roadLeftEdge + player.lane * laneWidth + laneWidth / 2;
            const py = canvas.height - 150 + player.stepYOffset;

            ctx.save();
            ctx.translate(px, py);

            // Fever 光環
            if (isFever) {
                ctx.beginPath();
                ctx.arc(0, 0, 80, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.4)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 0, 100, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
                ctx.fill();
            }

            // 身體
            ctx.fillStyle = player.color;
            ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
            
            // 頭部
            ctx.beginPath();
            ctx.arc(0, -player.height/2 - 30, 25, 0, Math.PI * 2);
            ctx.fillStyle = '#C0C0C0';
            ctx.fill();
            ctx.stroke();

            // 臉部表情彩蛋
            ctx.fillStyle = 'black';
            if (isFever) {
                // Fever 燃燒狀態
                ctx.font = '15px Arial';
                ctx.fillText('🔥', -10, -player.height/2 - 30);
                ctx.fillText('🔥', 10, -player.height/2 - 30);
                ctx.beginPath();
                ctx.arc(0, -player.height/2 - 20, 10, 0, Math.PI, false); // 大喊的嘴
                ctx.fill();
            } else if (energy === 0 && frameCount > 100) {
                // 體力耗盡累壞狀態
                ctx.font = '15px Arial';
                ctx.fillText('X', -10, -player.height/2 - 30);
                ctx.fillText('X', 10, -player.height/2 - 30);
                // 畫一滴冷汗
                ctx.fillStyle = '#00BFFF';
                ctx.beginPath();
                ctx.arc(20, -player.height/2 - 40, 5, 0, Math.PI*2);
                ctx.fill();
                // 嘴巴下垂
                ctx.strokeStyle = 'black';
                ctx.beginPath();
                ctx.arc(0, -player.height/2 - 15, 10, Math.PI, 0, false);
                ctx.stroke();
            } else {
                // 正常微笑
                ctx.fillRect(-10, -player.height/2 - 35, 5, 5);
                ctx.fillRect(5, -player.height/2 - 35, 5, 5);
                ctx.beginPath();
                ctx.arc(0, -player.height/2 - 25, 10, 0, Math.PI, false);
                ctx.stroke();
            }

            // 手臂繪製
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#C0C0C0';

            // 左手
            ctx.beginPath();
            if (player.leftArm) {
                // 平舉
                ctx.moveTo(-player.width/2, -20);
                ctx.lineTo(-player.width/2 - 80, -20);
            } else {
                // 跑步擺動
                ctx.moveTo(-player.width/2, -20);
                const swing = Math.sin(frameCount * 0.2) * 20;
                ctx.lineTo(-player.width/2 - 20, 20 + swing);
            }
            ctx.stroke();

            // 右手
            ctx.beginPath();
            if (player.rightArm) {
                // 平舉
                ctx.moveTo(player.width/2, -20);
                ctx.lineTo(player.width/2 + 80, -20);
            } else {
                // 跑步擺動
                ctx.moveTo(player.width/2, -20);
                const swing = Math.cos(frameCount * 0.2) * 20;
                ctx.lineTo(player.width/2 + 20, 20 + swing);
            }
            ctx.stroke();

            // 腳步繪製 (踏步動畫)
            ctx.lineWidth = 15;
            ctx.strokeStyle = '#333';
            
            let leftLegY = player.height/2 + 30;
            let rightLegY = player.height/2 + 30;
            
            if (player.stepTick > 0) {
                if (frameCount % 4 < 2) {
                    leftLegY -= 20;
                } else {
                    rightLegY -= 20;
                }
                player.stepTick--;
            } else if (isFever) {
                 // 衝刺時雙腳快速擺動
                 leftLegY += Math.sin(frameCount * 0.5) * 20;
                 rightLegY += Math.cos(frameCount * 0.5) * 20;
            }

            // 左腳
            ctx.beginPath();
            ctx.moveTo(-15, player.height/2);
            ctx.lineTo(-15, leftLegY);
            ctx.stroke();
            
            // 右腳
            ctx.beginPath();
            ctx.moveTo(15, player.height/2);
            ctx.lineTo(15, rightLegY);
            ctx.stroke();

            ctx.restore();
        }

        // 繪製與更新遊戲物件
        function handleObjects() {
            const playerX = roadLeftEdge + player.lane * laneWidth + laneWidth / 2;
            const playerY = canvas.height - 150;

            for (let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                if (!obj.active) continue;

                // 移動物件
                obj.y += speed;

                // 決定物件 X 座標
                let objCenterX = roadLeftEdge + obj.lane * laneWidth + laneWidth / 2;
                
                // 動態移動邏輯
                if (obj.type === 'moving_doge') {
                    // 狗狗 S 型跑法 (橫跨車道，模擬不受控的狗狗)
                    const sway = Math.sin(frameCount * 0.05 + obj.randomOffset) * (laneWidth * 0.8);
                    objCenterX += sway;
                    // 限制在道路範圍內
                    objCenterX = Math.max(roadLeftEdge + obj.width/2, Math.min(roadLeftEdge + roadWidth - obj.width/2, objCenterX));
                } else {
                    if (obj.type === 'item_left') objCenterX -= laneWidth * 0.35; // 偏左
                    if (obj.type === 'item_right') objCenterX += laneWidth * 0.35; // 偏右
                }

                obj.x = objCenterX - obj.width / 2;

                // 繪製物件
                if (obj.type === 'obstacle') {
                    // 畫路障 (橘色與灰色相間)
                    ctx.fillStyle = obj.color;
                    ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
                    ctx.fillStyle = '#666';
                    ctx.fillRect(obj.x + 10, obj.y, 20, obj.height);
                    ctx.fillRect(obj.x + 50, obj.y, 20, obj.height);
                } else if (obj.type === 'coin') {
                    // 畫金幣
                    ctx.fillStyle = obj.color;
                    ctx.beginPath();
                    ctx.arc(objCenterX, obj.y + obj.height/2, obj.width/2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#B8860B';
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', objCenterX, obj.y + obj.height/2);
                } else if (obj.type === 'item_left' || obj.type === 'item_right') {
                    // 手部道具 (圓形底座 + 文字)
                    ctx.fillStyle = obj.color;
                    ctx.beginPath();
                    ctx.arc(objCenterX, obj.y + obj.height/2, obj.width/2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = '16px Noto Sans TC';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obj.type === 'item_left' ? 'L手' : 'R手', objCenterX, obj.y + obj.height/2);
                } else if (obj.type === 'moving_doge' && obj.text) {
                    // 畫失控的狗狗 Emoji
                    ctx.font = `${obj.width}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(obj.text, objCenterX, obj.y + obj.height/2);
                }

                // 碰撞判定
                if (obj.y + obj.height > playerY - player.height/2 && obj.y < playerY + player.height/2) {
                    
                    let isHit = false;

                    // 針對不同物件，給予不同的 X 軸判定方式
                    if (obj.type === 'moving_doge') {
                        // 狗狗會跨車道，使用嚴格的實際座標距離碰撞
                        isHit = Math.abs(objCenterX - playerX) < (obj.width/2 + player.width/2 - 10);
                    } else if (obj.type === 'item_left') {
                        // 左手道具：玩家需在同車道，且確實舉起左手(或在Fever狀態)
                        isHit = (obj.lane === player.lane) && (player.leftArm || isFever);
                    } else if (obj.type === 'item_right') {
                        // 右手道具：玩家需在同車道，且確實舉起右手(或在Fever狀態)
                        isHit = (obj.lane === player.lane) && (player.rightArm || isFever);
                    } else {
                        // 一般路障與金幣：只要在同車道即判定碰撞
                        isHit = (obj.lane === player.lane);
                    }

                    if (isHit) {
                        
                        // 依照物件類型觸發不同效果
                        if (obj.type === 'obstacle') {
                            if (!isFever) {
                                showFloatingText("撞到路障！", playerX, playerY - 50, "#FF0000");
                                gameOver();
                                return;
                            } else {
                                score += 50;
                                obj.active = false;
                                showFloatingText("衝撞粉碎！", objCenterX, obj.y, "#FFA500");
                            }
                        } 
                        else if (obj.type === 'moving_doge') {
                            // 撞到狗不會死，但會扣 50 分且能量歸零 (絆倒)
                            if (!isFever) {
                                score = Math.max(0, score - 50);
                                energy = 0;
                                obj.active = false;
                                showFloatingText("被狗咬！-50分", playerX, playerY - 50, "#FF4500");
                            } else {
                                score += 100;
                                obj.active = false;
                                showFloatingText("狗狗飛走啦！", objCenterX, obj.y, "#FFF");
                            }
                        }
                        else if (obj.type === 'coin') {
                            score += 10;
                            obj.active = false;
                            showFloatingText("+10", objCenterX, obj.y, "#FFD700");
                            progressMission('coin');
                        }
                        else if (obj.type === 'item_left') {
                            score += 20;
                            obj.active = false;
                            showFloatingText("左手 Nice!", objCenterX, obj.y, "#00FA9A");
                            progressMission('left_arm');
                        }
                        else if (obj.type === 'item_right') {
                            score += 20;
                            obj.active = false;
                            showFloatingText("右手 Nice!", objCenterX, obj.y, "#00FA9A");
                            progressMission('right_arm');
                        }
                    }
                }

                // 移除出界的物件
                if (obj.y > canvas.height) {
                    gameObjects.splice(i, 1);
                }
            }
        }

        // 遊戲結束邏輯
        function gameOver() {
            gameState = 'GAMEOVER';
            cancelAnimationFrame(animationId);
            finalScoreEl.innerText = Math.floor(score);
            gameOverScreen.classList.remove('hidden');
        }

        // 遊戲主迴圈
        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            // 清空畫布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新邏輯
            frameCount++;
            
            if (isFever) {
                speed = baseSpeed * 2.5;
                feverTimer++;
                score += 0.5; // Fever 持續加分
                if (feverTimer > 300) { // Fever 持續約 5 秒 (假設 60fps)
                    isFever = false;
                    feverTimer = 0;
                    energy = 0; // 歸零
                    feverTextEl.style.opacity = 0;
                    document.body.style.backgroundColor = '#87CEEB';
                    
                    // 解除強制平舉 (如果玩家沒按著鍵的話)
                    if(!keys['KeyQ']) player.leftArm = false;
                    if(!keys['KeyE']) player.rightArm = false;
                }
            } else {
                speed = baseSpeed;
                score += 0.05; // 基礎前進加分
                
                // 能量隨時間略微下降，鼓勵持續踏步
                if (frameCount % 10 === 0 && energy > 0) {
                    energy -= 0.5;
                }
            }

            // 任務倒數與生成
            if (!currentMission && !isFever) {
                missionCooldown--;
                if (missionCooldown <= 0) {
                    generateMission();
                }
            }

            // 踏步視覺上下浮動
            player.stepYOffset = isFever ? 0 : Math.sin(frameCount * 0.1) * 5;

            // 執行繪製與判斷
            drawBackground();
            spawnObject();
            handleObjects();
            drawPlayer();
            updateHUD();

            // 下一幀
            animationId = requestAnimationFrame(gameLoop);
        }

        // 按鈕事件綁定
        document.getElementById('start-btn').addEventListener('click', initGame);
        document.getElementById('restart-btn').addEventListener('click', initGame);

    </script>
</body>
